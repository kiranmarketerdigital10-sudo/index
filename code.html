<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Table 1 to 100</title>

  <!-- Backlink -->
  <meta name="author" content="Suman Kumar Phuyal">
</head>

<body>

  <h1>Numbers Table (1 to 100)</h1>

  <!-- Backlink to your website -->
  <p>
    Created by 
    <a href="https://sumankumarphuyal.com/" target="_blank" rel="dofollow">
      Suman Kumar Phuyal
    </a>
  </p>

  <table border="1" cellpadding="10" cellspacing="0">
    <tbody id="numberTable"></tbody>
  </table>

  <script>
    const table = document.getElementById("numberTable");

    let number = 1;

    for (let row = 0; row < 10; row++) {
      let tr = document.createElement("tr");

      for (let col = 0; col < 10; col++) {
        let td = document.createElement("td");
        td.textContent = number;
        tr.appendChild(td);
        number++;
      }

      table.appendChild(tr);
    }
  </script>

</body>
</html>
